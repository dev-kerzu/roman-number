name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: 'maven'

    # Compilazione
    - name: 1 - Compilazione del progetto
      run: mvn -B compile --file pom.xml

    # Esecuzione Test
    - name: 2 - Esecuzione dei test
      run: mvn -B test --file pom.xml

    # Analisi statica
    - name: 3 - Analisi statica del codice (Checkstyle)
      run: mvn -B package -DskipTests --file pom.xml

    # Coveralls
    - name: 4 - Report Coveralls
      run: mvn -B jacoco:report coveralls:report -DrepoToken=${{ secrets.COVERALLS_TOKEN }} --file pom.xml
